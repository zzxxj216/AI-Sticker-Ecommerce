{% extends 'v2_base.html' %}
{% block content %}
<style>
  .msku-new { padding-top:14px; }
  .msku-top { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; margin-bottom:16px; }
  .msku-top .field { display:flex; flex-direction:column; gap:4px; }
  .msku-top label { font-size:11px; color:var(--text-muted); }
  .msku-top select { padding:8px 10px; border:1px solid var(--line); border-radius:6px; font-size:13px; min-width:240px; }
  .msku-grid { display:grid; grid-template-columns:1.5fr 1fr; gap:16px; align-items:start; }
  @media (max-width:900px){ .msku-grid { grid-template-columns:1fr; } }
  .msku-packs { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; max-height:520px; overflow:auto; padding:4px; }
  .pack-card { border:2px solid var(--line); border-radius:10px; overflow:hidden; cursor:pointer; background:var(--surface); transition:border-color .12s, box-shadow .12s; position:relative; }
  .pack-card:hover { border-color:var(--accent); }
  .pack-card.selected { border-color:#8b5cf6; box-shadow:0 0 0 2px rgba(139,92,246,.25); }
  .pack-card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:#f3f4f6; }
  .pack-card .noimg { width:100%; aspect-ratio:1; display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:11px; background:#f3f4f6; }
  .pack-card .cap { padding:6px 8px; font-size:11px; line-height:1.3; }
  .pack-card .cap b { display:block; }
  .pack-card .check { position:absolute; top:6px; right:6px; width:22px; height:22px; border-radius:50%; background:#8b5cf6; color:#fff; display:none; align-items:center; justify-content:center; font-size:13px; font-weight:700; }
  .pack-card.selected .check { display:flex; }
  .pack-card input { display:none; }
  .msku-settings { border:1px solid var(--line); border-radius:10px; padding:16px; background:var(--bg-subtle); }
  .msku-settings label { display:block; font-size:11px; color:var(--text-muted); margin:10px 0 4px; }
  .msku-settings input, .msku-settings textarea { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:6px; font-size:13px; box-sizing:border-box; font-family:inherit; }
  .msku-settings textarea { font-family:monospace; resize:vertical; }
  .ai-btn { padding:3px 10px; font-size:11px; background:linear-gradient(90deg,#8b5cf6,#ec4899); color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
  .lbl-row { display:flex; justify-content:space-between; align-items:center; }
  .msku-help { font-size:11px; color:var(--text-muted); margin-top:4px; }
</style>

<div class="msku-new">
  <section class="page-header" style="margin-bottom:14px;">
    <div>
      <p class="eyebrow">多 SKU · 场景①</p>
      <h1>新建多 SKU 产品</h1>
      <p class="page-subtitle">选一个热点 → 点封面挑要打包的卡包 → AI 生成标题/描述 → 一个 listing 多个 SKU 变体。</p>
    </div>
    <div class="v2-action-row"><a href="/v2/lab/multi-sku" class="button ghost">← 返回多SKU列表</a></div>
  </section>

  <form method="post" action="/v2/lab/multi-sku/create" id="msku-form">
    <div class="msku-top">
      <div class="field">
        <label for="topic">热点（topic）</label>
        <select id="topic" name="topic_id" required>
          <option value="">— 选择热点 —</option>
          {% for t in topics %}
          <option value="{{ t.id }}">#{{ t.id }} {{ t.topic_name }} · {{ t.pack_count }} 包</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="shop">店铺（shop）</label>
        <select id="shop" name="shop">
          {% for s in tkshop_shops %}
          <option value="{{ s }}" {% if s == tkshop_default_shop %}selected{% endif %}>{{ shop_label(s) }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>已选 SKU</label>
        <strong id="sel-count" style="font-size:18px;color:#8b5cf6;">0</strong>
      </div>
    </div>

    <div class="msku-grid">
      <div>
        <div class="lbl-row"><label style="font-size:12px;color:var(--text-secondary);">点封面选择要变成 SKU 的卡包</label></div>
        <div class="msku-packs" id="packs">
          <p style="grid-column:1/-1;color:var(--text-muted);font-size:12px;text-align:center;padding:30px;">先选热点，卡包封面会自动加载</p>
        </div>
      </div>
      <div class="msku-settings">
        <button type="button" id="ai-fill"
                style="width:100%;padding:10px;background:linear-gradient(90deg,#8b5cf6,#ec4899);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px;">
          🤖 AI 一键生成标题 + 描述
        </button>
        <div id="ai-status" class="msku-help" style="min-height:16px;margin:6px 0 4px;"></div>

        <label for="title">标题（title）</label>
        <input type="text" id="title" name="title" maxlength="255" placeholder="点上方 AI 生成，或手动填写">

        <label for="desc">描述（description HTML）</label>
        <textarea id="desc" name="description_html" rows="6" placeholder="<p>...</p>"></textarea>

        <label for="selling-points">卖点（每行一条）</label>
        <textarea id="selling-points" name="selling_points" rows="4" placeholder="AI 会自动填充 5 条卖点"></textarea>

        <label for="keywords">关键词（每行一条）</label>
        <textarea id="keywords" name="keywords" rows="4" placeholder="AI 会自动填充 SEO 关键词"></textarea>
        <input type="hidden" id="detail-raw" name="detail_main_raw_text" value="">

        <label for="attr">变体维度名（买家看到的下拉标题）</label>
        <input type="text" id="attr" name="sales_attribute_name" value="Theme" maxlength="50">
        <p class="msku-help">如 Theme / Style / Pack Type。每个选中的卡包会成为这个维度下的一个 SKU。</p>

        <button type="submit" id="create-btn"
                style="margin-top:16px;width:100%;padding:11px;background:linear-gradient(90deg,#8b5cf6,#ec4899);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;" disabled>
          ＋ 创建多 SKU 产品
        </button>
      </div>
    </div>
  </form>
</div>

<script>
(function(){
  const topicSel = document.getElementById('topic');
  const packsEl  = document.getElementById('packs');
  const selCount = document.getElementById('sel-count');
  const createBtn = document.getElementById('create-btn');

  function selectedPackIds(){
    return Array.from(packsEl.querySelectorAll('input[name="pack_ids"]:checked')).map(i => i.value);
  }
  function refresh(){
    const n = selectedPackIds().length;
    selCount.textContent = n;
    createBtn.disabled = (n === 0 || !topicSel.value);
  }

  topicSel.addEventListener('change', async () => {
    const tid = topicSel.value;
    if (!tid){ packsEl.innerHTML = '<p style="grid-column:1/-1;color:var(--text-muted);font-size:12px;text-align:center;padding:30px;">先选热点</p>'; refresh(); return; }
    packsEl.innerHTML = '<p style="grid-column:1/-1;color:var(--text-muted);font-size:12px;text-align:center;padding:30px;">⏳ 加载中…</p>';
    try {
      const r = await fetch(`/v2/lab/multi-sku/topics/${tid}/packs`);
      const d = await r.json();
      if (!d.ok || !d.packs.length){ packsEl.innerHTML = '<p style="grid-column:1/-1;color:var(--text-muted);font-size:12px;text-align:center;padding:30px;">该热点下没有卡包。</p>'; refresh(); return; }
      packsEl.innerHTML = '';
      d.packs.forEach(p => {
        const card = document.createElement('div');
        card.className = 'pack-card';
        const img = p.cover_url
          ? `<img src="${p.cover_url}" alt="" loading="lazy">`
          : `<div class="noimg">无封面</div>`;
        card.innerHTML = `${img}<div class="check">✓</div>
          <div class="cap"><b>#${p.id} ${(p.display_name||p.pack_uid||'未命名').slice(0,28)}</b>
          <span style="color:var(--text-muted);">${p.total_stickers||0} 张</span></div>
          <input type="checkbox" name="pack_ids" value="${p.id}">`;
        const cb = card.querySelector('input');
        card.addEventListener('click', (e) => {
          if (e.target !== cb){ cb.checked = !cb.checked; }
          card.classList.toggle('selected', cb.checked);
          refresh();
        });
        packsEl.appendChild(card);
      });
      refresh();
    } catch(e){ packsEl.innerHTML = `<p style="grid-column:1/-1;color:var(--danger);font-size:12px;text-align:center;padding:30px;">加载失败: ${e.message}</p>`; }
  });

  const aiBtn = document.getElementById('ai-fill');
  const aiStatus = document.getElementById('ai-status');
  aiBtn.addEventListener('click', async () => {
    const tid = topicSel.value;
    const ids = selectedPackIds();
    if (!tid){ aiStatus.style.color = 'var(--danger)'; aiStatus.textContent = '请先选热点'; return; }
    if (!ids.length){ aiStatus.style.color = 'var(--danger)'; aiStatus.textContent = '请先选至少一个卡包'; return; }
    const old = aiBtn.textContent;
    aiBtn.textContent = '⏳ AI 生成中…（约 3-6 秒）'; aiBtn.disabled = true;
    aiStatus.style.color = 'var(--text-muted)'; aiStatus.textContent = '';
    try {
      const body = new URLSearchParams();
      body.set('topic_id', tid);
      body.set('sales_attribute_name', document.getElementById('attr').value || 'Theme');
      ids.forEach(id => body.append('pack_ids', id));
      const r = await fetch('/v2/lab/multi-sku/ai-listing', {method:'POST', body});
      const d = await r.json();
      if (!d.ok){ throw new Error(d.error || ('HTTP ' + r.status)); }
      if (d.title) document.getElementById('title').value = d.title;
      if (d.description_html) document.getElementById('desc').value = d.description_html;
      if (Array.isArray(d.selling_points)) document.getElementById('selling-points').value = d.selling_points.join('\n');
      if (Array.isArray(d.keywords)) document.getElementById('keywords').value = d.keywords.join('\n');
      if (d.detail_main_raw_text) document.getElementById('detail-raw').value = d.detail_main_raw_text;
      if (!d.title && !d.description_html && !d.selling_points && !d.keywords){
        aiStatus.style.color = 'var(--danger)'; aiStatus.textContent = 'AI 返回为空，请重试';
      } else {
        aiStatus.style.color = '#16a34a'; aiStatus.textContent = '✓ 已生成标题、描述、卖点和关键词，可手动微调';
      }
    } catch(e){
      aiStatus.style.color = 'var(--danger)'; aiStatus.textContent = 'AI 失败: ' + e.message;
    } finally {
      aiBtn.textContent = old; aiBtn.disabled = false;
    }
  });
  refresh();
})();
</script>
{% endblock %}
