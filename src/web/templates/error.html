{% extends 'base.html' %}
{% block content %}
<div class="error-page">

    <defs><linearGradient id="err-grad" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#7c5cfc"/><stop offset="100%" stop-color="#f87171"/></linearGradient></defs>
    <circle cx="12" cy="12" r="10"/>
    <line x1="15" y1="9" x2="9" y2="15"/>
    <line x1="9" y1="9" x2="15" y2="15"/>
  </svg>
  <h1>{{ status_code }}</h1>
  <p>{{ detail }}</p>
  <a class="button-secondary" href="/" style="margin-top:20px;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    返回首页
  </a>
</div>
{% endblock %}
