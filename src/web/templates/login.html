<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — 贴纸工作台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f8f9fc 0%,#eef1f8 100%);color:#1a1a2e}
    .login-card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);padding:48px 40px;width:100%;max-width:420px;text-align:center}
    .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
    .brand svg{flex-shrink:0}
    .brand-name{font-size:20px;font-weight:700;letter-spacing:-0.3px}
    .login-title{font-size:24px;font-weight:700;margin-bottom:8px}
    .login-subtitle{font-size:14px;color:#6b7280;margin-bottom:36px;line-height:1.6}
    .btn-feishu{display:inline-flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 24px;background:linear-gradient(135deg,#7c5cfc,#6246ea);color:#fff;font-size:15px;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all 0.2s;text-decoration:none}
    .btn-feishu:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,92,252,0.35)}
    .btn-feishu:active{transform:translateY(0)}
    .btn-feishu svg{flex-shrink:0}
    .divider{margin:28px 0;display:flex;align-items:center;gap:12px;color:#d1d5db;font-size:12px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
    .hint{font-size:13px;color:#9ca3af;line-height:1.6}
    .hint a{color:#7c5cfc;text-decoration:none;font-weight:500}
    .hint a:hover{text-decoration:underline}
    .alert-box{background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:14px 18px;margin-bottom:24px;font-size:13px;color:#92400e;line-height:1.5;text-align:left}
    .alert-box strong{font-weight:600}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#lg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="24" y2="24"><stop offset="0%" stop-color="#7c5cfc"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs>
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <span class="brand-name">贴纸工作台</span>
    </div>

    <h1 class="login-title">欢迎回来</h1>
    <p class="login-subtitle">使用飞书账号登录，访问完整的趋势审核与卡贴生成功能。</p>

    {% if not feishu_login_ready %}
    <div class="alert-box">
      <strong>飞书登录未配置</strong><br>
      请在 <code>.env</code> 中设置 <code>FEISHU_H5_APP_ID</code>、<code>FEISHU_H5_APP_SECRET</code> 和 <code>FEISHU_H5_REDIRECT_URI</code> 后重启应用。
    </div>
    {% endif %}

    {% if feishu_login_ready %}
    <a href="/auth/feishu/login" class="btn-feishu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
      飞书账号登录
    </a>
    {% else %}
    <button class="btn-feishu" disabled style="opacity:0.5;cursor:not-allowed;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M13.8 12H3"/></svg>
      飞书账号登录
    </button>
    {% endif %}

    <div class="divider">或</div>
    <p class="hint">
      无需登录即可 <a href="/trends">浏览趋势总览</a>（只读模式）
    </p>
  </div>
</body>
</html>
